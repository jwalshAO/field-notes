<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Field Intel">
  <meta name="theme-color" content="#1e40af">
  <title>Field Intel — Agility Ortho</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-700: #1d4ed8;
      --blue-600: #2563eb;
      --blue-500: #3b82f6;
      --blue-100: #dbeafe;
      --blue-50: #eff6ff;
      --gray-900: #111827;
      --gray-700: #374151;
      --gray-500: #6b7280;
      --gray-300: #d1d5db;
      --gray-200: #e5e7eb;
      --gray-100: #f3f4f6;
      --gray-50: #f9fafb;
      --white: #ffffff;
      --green-600: #16a34a;
      --green-100: #dcfce7;
      --red-600: #dc2626;
      --red-100: #fee2e2;
      --orange-500: #f97316;
      --orange-100: #ffedd5;
      --purple-500: #8b5cf6;
      --purple-100: #ede9fe;
      --teal-500: #14b8a6;
      --teal-100: #ccfbf1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--blue-700), var(--blue-600));
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub { font-size: 11px; opacity: 0.85; font-weight: 400; }
    .header-user {
      font-size: 13px;
      background: rgba(255,255,255,0.2);
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
    }
    .header-user:hover { background: rgba(255,255,255,0.3); }

    /* Navigation */
    .nav-tabs {
      display: flex;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 58px;
      z-index: 99;
    }
    .nav-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-500);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .nav-tab.active {
      color: var(--blue-600);
      border-bottom-color: var(--blue-600);
    }

    /* Main content */
    .content { padding: 16px; max-width: 600px; margin: 0 auto; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* Form elements */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--gray-300);
      border-radius: 10px;
      font-size: 16px;
      background: var(--white);
      color: var(--gray-900);
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--blue-500);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    textarea.form-input {
      min-height: 140px;
      resize: vertical;
      line-height: 1.5;
    }

    /* Autocomplete */
    .autocomplete-wrapper { position: relative; }
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--white);
      border: 1.5px solid var(--gray-300);
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      display: none;
    }
    .autocomplete-list.open { display: block; }
    .autocomplete-item {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--gray-100);
      font-size: 15px;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.highlighted {
      background: var(--blue-50);
    }
    .ac-name { font-weight: 600; }
    .ac-detail { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
    .ac-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 6px;
      margin-left: 8px;
    }
    .badge-active { background: var(--green-100); color: var(--green-600); }
    .badge-prospect { background: var(--orange-100); color: var(--orange-500); }
    .autocomplete-create {
      padding: 12px 14px;
      cursor: pointer;
      color: var(--blue-600);
      font-weight: 600;
      font-size: 14px;
      border-top: 1px solid var(--gray-200);
    }
    .autocomplete-create:hover { background: var(--blue-50); }
    .autocomplete-freeform {
      padding: 10px 14px;
      cursor: pointer;
      color: var(--gray-500);
      font-size: 13px;
      border-top: 1px solid var(--gray-200);
    }
    .autocomplete-freeform:hover { background: var(--gray-100); }

    /* Tags */
    .tags-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-chip {
      padding: 5px 10px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 600;
      border: 1.5px solid var(--gray-300);
      background: var(--white);
      color: var(--gray-700);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .tag-chip.selected {
      border-color: var(--blue-600);
      background: var(--blue-100);
      color: var(--blue-700);
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--blue-600);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: var(--blue-700); }
    .btn-submit:disabled { background: var(--gray-300); cursor: not-allowed; }

    /* Success message */
    .success-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--green-600);
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
      z-index: 200;
    }
    .success-toast.show { transform: translateX(-50%) translateY(0); }

    /* Notes feed */
    .note-card {
      background: var(--white);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid var(--gray-200);
    }
    .note-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .note-card-subject { font-weight: 700; font-size: 15px; color: var(--gray-900); }
    .note-card-date { font-size: 12px; color: var(--gray-500); white-space: nowrap; }
    .note-card-meta { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; }
    .note-card-body {
      font-size: 14px;
      line-height: 1.55;
      color: var(--gray-700);
      white-space: pre-wrap;
    }
    .note-card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .note-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--blue-100);
      color: var(--blue-700);
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--gray-500); }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state-text { font-size: 15px; }

    /* Login screen */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, var(--blue-50) 0%, var(--white) 50%);
    }
    .login-logo { font-size: 28px; font-weight: 800; color: var(--blue-700); margin-bottom: 4px; }
    .login-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 32px; }
    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-card h2 { font-size: 16px; margin-bottom: 16px; color: var(--gray-700); }
    .user-btn {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 8px;
      background: var(--gray-50);
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--gray-900);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-btn:hover { border-color: var(--blue-500); background: var(--blue-50); }
    .user-btn .role-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gray-500);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--gray-300);
      background: var(--white);
      color: var(--gray-700);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .filter-chip.active {
      border-color: var(--blue-600);
      background: var(--blue-600);
      color: white;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Add surgeon modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--white);
      border-radius: 16px 16px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 16px; }
    .btn-secondary {
      flex: 1; padding: 12px; border: 1.5px solid var(--gray-300);
      border-radius: 10px; background: var(--white); font-size: 15px;
      font-weight: 600; color: var(--gray-700); cursor: pointer;
    }
    .btn-primary {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      background: var(--blue-600); font-size: 15px; font-weight: 600;
      color: white; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-logo">Field Intel</div>
    <div class="login-sub">Agility Ortho</div>
    <div class="login-card">
      <h2>Who are you?</h2>
      <div id="userList"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appShell" style="display:none;">
    <div class="header">
      <div>
        <h1>Field Intel</h1>
        <div class="header-sub">Agility Ortho</div>
      </div>
      <div class="header-user" id="headerUser" onclick="logout()"></div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="new" onclick="switchTab('new')">+ New Note</button>
      <button class="nav-tab" data-tab="feed" onclick="switchTab('feed')">Notes Feed</button>
    </div>

    <div class="content">
      <!-- NEW NOTE SCREEN -->
      <div id="screen-new" class="screen active">
        <form id="noteForm" onsubmit="submitNote(event)">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" id="noteDate" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Surgeon</label>
            <div class="autocomplete-wrapper">
              <input type="text" id="subjectInput" class="form-input" placeholder="Start typing a surgeon name..." autocomplete="off" required>
              <div id="autocompleteList" class="autocomplete-list"></div>
            </div>
            <input type="hidden" id="selectedSurgeonId">
          </div>

          <div class="form-group">
            <label class="form-label">Tags (optional)</label>
            <div class="tags-row">
              <span class="tag-chip" data-tag="Surgeon Visit" onclick="toggleTag(this)">Surgeon Visit</span>
              <span class="tag-chip" data-tag="Case Feedback" onclick="toggleTag(this)">Case Feedback</span>
              <span class="tag-chip" data-tag="Competitive Intel" onclick="toggleTag(this)">Competitive Intel</span>
              <span class="tag-chip" data-tag="Product Interest" onclick="toggleTag(this)">Product Interest</span>
              <span class="tag-chip" data-tag="Issue / Complaint" onclick="toggleTag(this)">Issue / Complaint</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea id="noteBody" class="form-input" placeholder="All info is good info — what days a surgeon is where (to build out a calendar), what a surgeon uses, her preferences, things you overheard in the OR, something a Synthes rep tells you..." required></textarea>
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">Submit Note</button>
        </form>
      </div>

      <!-- NOTES FEED SCREEN -->
      <div id="screen-feed" class="screen">
        <div class="filter-bar">
          <span class="filter-chip active" data-filter="all" onclick="filterNotes('all', this)">All</span>
          <span class="filter-chip" data-filter="Surgeon Visit" onclick="filterNotes('Surgeon Visit', this)">Surgeon Visit</span>
          <span class="filter-chip" data-filter="Case Feedback" onclick="filterNotes('Case Feedback', this)">Case Feedback</span>
          <span class="filter-chip" data-filter="Competitive Intel" onclick="filterNotes('Competitive Intel', this)">Competitive Intel</span>
          <span class="filter-chip" data-filter="Product Interest" onclick="filterNotes('Product Interest', this)">Product Interest</span>
          <span class="filter-chip" data-filter="Issue / Complaint" onclick="filterNotes('Issue / Complaint', this)">Issue / Complaint</span>
        </div>
        <div id="notesFeed"></div>
      </div>
    </div>
  </div>

  <!-- SUCCESS TOAST -->
  <div id="successToast" class="success-toast">Note saved!</div>

  <!-- ADD SURGEON MODAL -->
  <div id="addSurgeonModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-title">Add New Surgeon</div>
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input type="text" id="newSurgeonFirst" class="form-input" placeholder="e.g. Sarah">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input type="text" id="newSurgeonLast" class="form-input" placeholder="e.g. Chen">
      </div>
      <div class="form-group">
        <label class="form-label">Primary Hospital (optional)</label>
        <input type="text" id="newSurgeonHospital" class="form-input" placeholder="e.g. Lankenau Medical Center">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeAddSurgeon()">Cancel</button>
        <button class="btn-primary" onclick="saveNewSurgeon()">Save Surgeon</button>
      </div>
    </div>
  </div>

<script>
// ============================================================
// CONFIG — oso-tray-tracker (the main Agility ops DB)
// ============================================================
const SUPABASE_URL = 'https://pchhtltxdcmvdcwnwaeg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjaGh0bHR4ZGNtdmRjd253YWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjQzODMsImV4cCI6MjA5MDQwMDM4M30.jeK_Xm2ypDfcp8qJj5Y1l-jZEa4sRTkoDv4AM7g5A2s';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let allReps = [];
let allSurgeons = [];
let allNotes = [];
let selectedTags = [];
let selectedSurgeon = null;
let highlightIndex = -1;

// ============================================================
// INIT
// ============================================================
async function init() {
  try {
    const savedUserId = window.location.hash?.replace('#', '') || null;

    // Load reps (team members)
    const { data: reps, error } = await sb.from('reps').select('*').eq('active', true).order('sort_order');
    if (error) {
      console.error('Supabase error:', error);
      document.getElementById('userList').innerHTML = '<p style="color:red;padding:12px;">Error loading team: ' + error.message + '</p>';
      return;
    }
    allReps = reps || [];

    if (savedUserId) {
      const user = allReps.find(u => String(u.id) === savedUserId);
      if (user) { loginAs(user); return; }
    }

    renderLoginScreen();
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('userList').innerHTML = '<p style="color:red;padding:12px;">Error: ' + e.message + '</p>';
  }
}

function renderLoginScreen() {
  const container = document.getElementById('userList');
  // Group: Owner first, then TMs, then Associate Reps
  const roleOrder = { 'Owner': 0, 'Territory Manager': 1, 'Associate Rep': 2 };
  const sorted = [...allReps].sort((a, b) => (roleOrder[a.role] ?? 3) - (roleOrder[b.role] ?? 3) || a.name.localeCompare(b.name));

  const roleLabel = (r) => {
    if (r === 'Owner') return 'Owner';
    if (r === 'Territory Manager') return 'TM';
    return 'S3';
  };

  container.innerHTML = sorted.map(u => `
    <button class="user-btn" onclick='loginAs(${JSON.stringify(u).replace(/'/g, "&#39;")})'>
      <span>${escHtml(u.name)}</span>
      <span class="role-label">${roleLabel(u.role)}</span>
    </button>
  `).join('');
}

function loginAs(user) {
  currentUser = user;
  window.location.hash = user.id;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  document.getElementById('headerUser').textContent = user.name.split(' ')[0] + ' \u25BE';

  // Set today's date
  document.getElementById('noteDate').value = new Date().toISOString().split('T')[0];

  loadSurgeons();
  loadNotes();
}

function logout() {
  currentUser = null;
  window.location.hash = '';
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('appShell').style.display = 'none';
  renderLoginScreen();
}

// ============================================================
// SURGEONS (for autocomplete)
// ============================================================
async function loadSurgeons() {
  const { data } = await sb.from('surgeons')
    .select('id, first_name, last_name, credential, primary_hospital, status, specialty, funnel_stage')
    .order('last_name');
  allSurgeons = data || [];
}

// ============================================================
// AUTOCOMPLETE — Surgeon search
// ============================================================
const subjectInput = document.getElementById('subjectInput');
const acList = document.getElementById('autocompleteList');

subjectInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  selectedSurgeon = null;
  document.getElementById('selectedSurgeonId').value = '';
  highlightIndex = -1;

  if (q.length < 2) { acList.classList.remove('open'); return; }

  const matches = allSurgeons.filter(s => {
    const full = (s.last_name + ' ' + s.first_name + ' ' + (s.primary_hospital || '')).toLowerCase();
    return full.includes(q);
  }).slice(0, 10);

  let html = matches.map((s, i) => {
    const displayName = s.last_name + ', ' + s.first_name + (s.credential ? ', ' + s.credential : '');
    const isActive = s.status === 'regular_user' || s.funnel_stage === 'active';
    const badgeClass = isActive ? 'badge-active' : 'badge-prospect';
    const badgeText = isActive ? 'Active' : (s.funnel_stage || s.status || 'Prospect');
    return `
      <div class="autocomplete-item" data-index="${i}" onclick='selectSurgeon(${JSON.stringify(s).replace(/'/g, "&#39;")})'>
        <div class="ac-name">${highlightMatch(displayName, q)}<span class="ac-badge ${badgeClass}">${escHtml(badgeText)}</span></div>
        ${s.primary_hospital ? `<div class="ac-detail">${escHtml(s.primary_hospital)}${s.specialty ? ' · ' + escHtml(s.specialty) : ''}</div>` : ''}
      </div>
    `;
  }).join('');

  // "Add new surgeon" option
  html += `
    <div class="autocomplete-create" onclick="createSurgeonFromInput()">
      + Add new surgeon
    </div>
  `;

  // Freeform fallback
  html += `
    <div class="autocomplete-freeform" onclick="useFreeform()">
      Use "${escHtml(this.value)}" as-is (no surgeon link)
    </div>
  `;

  acList.innerHTML = html;
  acList.classList.add('open');
});

subjectInput.addEventListener('keydown', function(e) {
  const items = acList.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    highlightIndex = Math.min(highlightIndex + 1, items.length - 1);
    updateHighlight(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    highlightIndex = Math.max(highlightIndex - 1, 0);
    updateHighlight(items);
  } else if (e.key === 'Enter' && highlightIndex >= 0 && items[highlightIndex]) {
    e.preventDefault();
    items[highlightIndex].click();
  } else if (e.key === 'Escape') {
    acList.classList.remove('open');
  }
});

function updateHighlight(items) {
  items.forEach((item, i) => item.classList.toggle('highlighted', i === highlightIndex));
}

subjectInput.addEventListener('blur', function() {
  setTimeout(() => acList.classList.remove('open'), 200);
});
subjectInput.addEventListener('focus', function() {
  if (this.value.trim().length >= 2) this.dispatchEvent(new Event('input'));
});

function selectSurgeon(surgeon) {
  selectedSurgeon = surgeon;
  document.getElementById('selectedSurgeonId').value = surgeon.id;
  subjectInput.value = surgeon.last_name + ', ' + surgeon.first_name + (surgeon.credential ? ', ' + surgeon.credential : '');
  acList.classList.remove('open');
}

function useFreeform() {
  // Keep the text as-is, no surgeon link
  selectedSurgeon = null;
  document.getElementById('selectedSurgeonId').value = '';
  acList.classList.remove('open');
}

function createSurgeonFromInput() {
  // Pre-fill the modal with what the user typed
  const parts = subjectInput.value.trim().split(/[\s,]+/);
  if (parts.length >= 2) {
    document.getElementById('newSurgeonFirst').value = parts[0];
    document.getElementById('newSurgeonLast').value = parts.slice(1).join(' ');
  } else {
    document.getElementById('newSurgeonLast').value = subjectInput.value.trim();
    document.getElementById('newSurgeonFirst').value = '';
  }
  openAddSurgeon();
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx)) + '<strong>' + escHtml(text.slice(idx, idx + query.length)) + '</strong>' + escHtml(text.slice(idx + query.length));
}

// ============================================================
// TAGS
// ============================================================
function toggleTag(el) {
  el.classList.toggle('selected');
  const tag = el.dataset.tag;
  if (selectedTags.includes(tag)) {
    selectedTags = selectedTags.filter(t => t !== tag);
  } else {
    selectedTags.push(tag);
  }
}

// ============================================================
// SUBMIT NOTE
// ============================================================
async function submitNote(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const noteData = {
    rep_id: currentUser.id,
    surgeon_id: selectedSurgeon ? selectedSurgeon.id : null,
    subject_text: subjectInput.value.trim(),
    note_body: document.getElementById('noteBody').value.trim(),
    tags: selectedTags,
    note_date: document.getElementById('noteDate').value
  };

  const { error } = await sb.from('field_notes').insert([noteData]);

  btn.disabled = false;
  btn.textContent = 'Submit Note';

  if (error) {
    alert('Error saving note: ' + error.message);
    return;
  }

  // Show success
  const toast = document.getElementById('successToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);

  // Reset form
  document.getElementById('noteForm').reset();
  document.getElementById('noteDate').value = new Date().toISOString().split('T')[0];
  selectedTags = [];
  selectedSurgeon = null;
  document.getElementById('selectedSurgeonId').value = '';
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('selected'));

  // Refresh feed
  loadNotes();
}

// ============================================================
// NOTES FEED
// ============================================================
async function loadNotes() {
  // Build query — join to reps (author) and surgeons (subject)
  let query = sb.from('field_notes')
    .select('*, reps(name, role, territory_id), surgeons(first_name, last_name, credential, primary_hospital)')
    .order('note_date', { ascending: false })
    .order('created_at', { ascending: false })
    .limit(100);

  // Role-based visibility
  if (currentUser.role === 'Associate Rep') {
    // S3s see only their own notes
    query = query.eq('rep_id', currentUser.id);
  } else if (currentUser.role === 'Territory Manager') {
    // TMs see notes from anyone on their territory
    const teamIds = allReps
      .filter(r => r.territory_id === currentUser.territory_id)
      .map(r => r.id);
    query = query.in('rep_id', teamIds);
  }
  // Owner sees all — no filter

  const { data } = await query;
  allNotes = data || [];
  renderNotesFeed();
}

function renderNotesFeed(filterTag = 'all') {
  const container = document.getElementById('notesFeed');
  let filtered = allNotes;
  if (filterTag !== 'all') {
    filtered = filtered.filter(n => n.tags && n.tags.includes(filterTag));
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-text">No notes yet. Go add some field intel!</div></div>';
    return;
  }

  container.innerHTML = filtered.map(n => {
    const authorName = n.reps?.name || 'Unknown';
    const surgeon = n.surgeons;
    const surgeonDisplay = surgeon ? (surgeon.last_name + ', ' + surgeon.first_name + (surgeon.credential ? ', ' + surgeon.credential : '')) : '';
    const hospital = surgeon?.primary_hospital || '';
    const dateStr = formatDate(n.note_date);

    return `
      <div class="note-card">
        <div class="note-card-header">
          <div class="note-card-subject">${escHtml(surgeonDisplay || n.subject_text)}</div>
          <div class="note-card-date">${dateStr}</div>
        </div>
        <div class="note-card-meta">
          ${escHtml(authorName)}${hospital ? ' · ' + escHtml(hospital) : ''}
        </div>
        <div class="note-card-body">${escHtml(n.note_body)}</div>
        ${n.tags && n.tags.length ? `
          <div class="note-card-tags">
            ${n.tags.map(t => `<span class="note-tag">${escHtml(t)}</span>`).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function filterNotes(tag, el) {
  document.querySelectorAll('[data-filter]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderNotesFeed(tag);
}

// ============================================================
// ADD SURGEON MODAL
// ============================================================
function openAddSurgeon() {
  document.getElementById('addSurgeonModal').classList.add('open');
}
function closeAddSurgeon() {
  document.getElementById('addSurgeonModal').classList.remove('open');
  document.getElementById('newSurgeonFirst').value = '';
  document.getElementById('newSurgeonLast').value = '';
  document.getElementById('newSurgeonHospital').value = '';
}
function closeModal(e) {
  if (e.target === e.currentTarget) closeAddSurgeon();
}

async function saveNewSurgeon() {
  const first = document.getElementById('newSurgeonFirst').value.trim();
  const last = document.getElementById('newSurgeonLast').value.trim();
  const hospital = document.getElementById('newSurgeonHospital').value.trim();

  if (!first || !last) { alert('Please enter first and last name'); return; }

  const { data, error } = await sb.from('surgeons').insert([{
    first_name: first,
    last_name: last,
    primary_hospital: hospital || null,
    status: 'prospect',
    funnel_stage: 'prospect'
  }]).select().single();

  if (error) { alert('Error: ' + error.message); return; }

  // Add to local list and select
  allSurgeons.push(data);
  allSurgeons.sort((a, b) => a.last_name.localeCompare(b.last_name));

  selectSurgeon(data);
  closeAddSurgeon();
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');

  if (tab === 'feed') loadNotes();
}

// ============================================================
// HELPERS
// ============================================================
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((today - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return d.toLocaleDateString('en-US', { weekday: 'long' });
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ============================================================

init();
